name = "waldensrevisited"
main = "src/worker.js"
compatibility_date = "2024-12-01"

[observability]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[vars]
GOOGLE_CLIENT_ID = "865105554486-uu5ilnjk0oshjlu4iib4aidaptii476r.apps.googleusercontent.com"
ADMIN_EMAILS = "admin@waldensrevisited.org"

[[d1_databases]]
binding = "DB"
database_name = "waldensrevisited-db"
database_id = "2c1a9add-eed7-45ca-87f3-adf18a268764"

[[kv_namespaces]]
binding = "SESSIONS"
id = "f52131d68309439a9a1b321113493321"

# R2 disabled until enabled in Cloudflare Dashboard
# [[r2_buckets]]
# binding = "UPLOADS"
# bucket_name = "waldensrevisited-uploads"

# Daily chat message purge at 3:17 AM UTC
[triggers]
crons = ["17 3 * * *"]

[env.beta]
name = "waldensrevisited-beta"

[env.beta.vars]
GOOGLE_CLIENT_ID = "865105554486-uu5ilnjk0oshjlu4iib4aidaptii476r.apps.googleusercontent.com"
ADMIN_EMAILS = "admin@waldensrevisited.org"

[[env.beta.d1_databases]]
binding = "DB"
database_name = "waldensrevisited-db"
database_id = "2c1a9add-eed7-45ca-87f3-adf18a268764"

[[env.beta.kv_namespaces]]
binding = "SESSIONS"
id = "f52131d68309439a9a1b321113493321"

# R2 disabled until enabled in Cloudflare Dashboard
# [[env.beta.r2_buckets]]
# binding = "UPLOADS"
# bucket_name = "waldensrevisited-uploads"
