<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documents — Walden's Revisited</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/members/members.css">
  <style>
    .doc-list { list-style: none; padding: 0; }
    .doc-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm);
      border-bottom: 1px solid rgba(139, 115, 85, 0.08);
      transition: background 0.15s;
    }
    .doc-item:last-child { border-bottom: none; }
    .doc-item:hover { background: var(--mist); border-radius: 8px; }
    .doc-icon {
      width: 40px;
      height: 40px;
      background: rgba(107, 143, 122, 0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--forest-deep);
    }
    .doc-info { flex: 1; }
    .doc-info h4 {
      font-family: var(--font-display);
      font-size: 1.05rem;
      color: var(--forest-deep);
      margin-bottom: 2px;
    }
    .doc-info p {
      font-size: 0.85rem;
      color: var(--stone);
      line-height: 1.4;
    }
    .doc-date {
      font-size: 0.8rem;
      color: var(--lichen);
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 90px;
      text-align: right;
    }
    .doc-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    @media (max-width: 600px) {
      .doc-item { flex-wrap: wrap; }
      .doc-date { min-width: auto; text-align: left; width: 100%; order: -1; margin-bottom: 4px; }
    }
  </style>
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <svg class="nav-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 4C16 4 8 10 8 18C8 22.4183 11.5817 26 16 26C20.4183 26 24 22.4183 24 18C24 10 16 4 16 4Z" fill="currentColor" opacity="0.2"/>
          <path d="M16 4C16 4 8 10 8 18C8 22.4183 11.5817 26 16 26C20.4183 26 24 22.4183 24 18C24 10 16 4 16 4Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16 14V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M13 17L16 14L19 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Walden's Revisited
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/#history">History</a></li>
        <li><a href="/#community">Community</a></li>
        <li><a href="/#common-areas">Common Areas</a></li>
        <li><a href="/#covenants">Covenants</a></li>
        <li id="navSignIn"><a href="/members/" class="nav-signin">Sign In</a></li>
        <li id="navMembers" style="display:none;" class="nav-user-profile">
          <a href="/members/" class="nav-members-link">Members</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="members-layout">
    <nav class="members-sidebar" id="membersSidebar"></nav>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <button class="sidebar-toggle" id="sidebarToggle"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <main class="members-main">

  <div class="members-page">
    <div class="container" style="max-width:750px;">

      <div class="members-header">
        <h1>Documents</h1>
        <p>Official governing documents, corporate filings, legal references, and historical records for the Walden's Revisited Homeowners Association.</p>
      </div>

      <div id="docsContainer"><p style="color:var(--stone);">Loading documents...</p></div>

    </div>
  </div>

    </main>
  </div>

  <!-- PDF Viewer (reuse existing) -->
  <script type="module" src="/pdf-viewer.js"></script>
  <script src="/members/avatars.js"></script>
  <script src="/members/members.js"></script>
  <script>
    const session = window.__session;
    if (!session) window.location.href = '/login.html';

    initMembersSidebar('documents');

    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('active');
    });

    const categoryLabels = {
      governing: 'Governing Documents',
      corporate: 'Corporate Filings',
      legal: 'Legal References',
      historical: 'Historical Documents'
    };
    const categoryOrder = ['governing', 'corporate', 'legal', 'historical'];
    const docIcon = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';

    function esc(s) { if (!s) return ''; const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }

    (async function() {
      const container = document.getElementById('docsContainer');
      try {
        const res = await fetch('/api/documents');
        if (!res.ok) throw new Error();
        const docs = await res.json();
        if (!docs.length) { container.innerHTML = '<p style="color:var(--stone);">No documents on file yet.</p>'; return; }

        // Group by category
        const groups = {};
        for (const d of docs) {
          if (!groups[d.category]) groups[d.category] = [];
          groups[d.category].push(d);
        }

        let html = '';
        for (const cat of categoryOrder) {
          const items = groups[cat];
          if (!items || !items.length) continue;
          html += '<div class="profile-section" id="' + esc(cat) + '">';
          html += '<h2>' + esc(categoryLabels[cat] || cat) + '</h2>';
          html += '<ul class="doc-list">';
          for (const d of items) {
            const fileUrl = d.file_url || d.external_url;
            const isExternal = !d.file_url && d.external_url;
            const meta = d.metadata || {};

            // Legal items with highlights get a richer layout
            if (cat === 'legal' && meta.highlights) {
              html += '<li class="doc-item" style="flex-direction:column;align-items:stretch;gap:var(--space-xs);">';
              html += '<div style="display:flex;align-items:center;gap:var(--space-sm);">';
              html += '<div class="doc-icon">' + docIcon + '</div>';
              html += '<div class="doc-info"><h4>' + esc(d.title) + '</h4><p>' + esc(d.description) + '</p></div>';
              if (d.date) html += '<span class="doc-date">' + esc(d.date) + '</span>';
              html += '<div class="doc-actions">';
              if (fileUrl && !isExternal) {
                html += '<a href="' + esc(fileUrl) + '" class="btn btn-secondary btn-sm" download>Download</a>';
                html += '<button class="btn btn-primary btn-sm" onclick="openPdfViewer(\'' + esc(fileUrl) + '\', \'' + esc(d.title) + '\')">View</button>';
              } else if (isExternal) {
                html += '<a href="' + esc(d.external_url) + '" target="_blank" class="btn btn-primary btn-sm">View</a>';
              }
              html += '</div></div>';
              // Highlights
              html += '<div style="padding:var(--space-sm);background:var(--mist);border-radius:6px;margin-top:4px;">';
              html += '<ul style="list-style:none;padding:0;margin:0;font-size:0.85rem;color:var(--earth);line-height:1.6;">';
              for (const h of meta.highlights) {
                html += '<li style="padding:3px 0;">' + esc(h) + '</li>';
              }
              html += '</ul></div>';
              html += '</li>';
            } else {
              html += '<li class="doc-item">';
              html += '<div class="doc-icon">' + docIcon + '</div>';
              html += '<div class="doc-info"><h4>' + esc(d.title) + '</h4><p>' + esc(d.description) + '</p></div>';
              if (d.date) html += '<span class="doc-date">' + esc(d.date) + '</span>';
              html += '<div class="doc-actions">';
              if (fileUrl && !isExternal) {
                html += '<a href="' + esc(fileUrl) + '" class="btn btn-secondary btn-sm" download>Download</a>';
                html += '<button class="btn btn-primary btn-sm" onclick="openPdfViewer(\'' + esc(fileUrl) + '\', \'' + esc(d.title) + '\')">View</button>';
              } else if (isExternal) {
                html += '<a href="' + esc(d.external_url) + '" target="_blank" class="btn btn-primary btn-sm">View</a>';
              }
              html += '</div></li>';
            }
          }
          html += '</ul></div>';
        }
        container.innerHTML = html;

        // Scroll to hash if present (e.g., #legal)
        if (window.location.hash) {
          const target = document.getElementById(window.location.hash.substring(1));
          if (target) target.scrollIntoView({ behavior: 'smooth' });
        }
      } catch (e) {
        container.innerHTML = '<p style="color:var(--clay);">Unable to load documents.</p>';
      }
    })();
  </script>
</body>
</html>
