<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members — Walden's Revisited</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/members/members.css">
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <svg class="nav-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 4C16 4 8 10 8 18C8 22.4183 11.5817 26 16 26C20.4183 26 24 22.4183 24 18C24 10 16 4 16 4Z" fill="currentColor" opacity="0.2"/>
          <path d="M16 4C16 4 8 10 8 18C8 22.4183 11.5817 26 16 26C20.4183 26 24 22.4183 24 18C24 10 16 4 16 4Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16 14V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M13 17L16 14L19 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Walden's Revisited
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/#history">History</a></li>
        <li><a href="/#community">Community</a></li>
        <li><a href="/#common-areas">Common Areas</a></li>
        <li><a href="/#covenants">Covenants</a></li>
        <li id="navSignIn"><a href="/members/" class="nav-signin">Sign In</a></li>
        <li id="navMembers" style="display:none;" class="nav-user-profile">
          <a href="/members/" class="nav-members-link">Members</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="members-layout">
    <nav class="members-sidebar" id="membersSidebar"></nav>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <button class="sidebar-toggle" id="sidebarToggle"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <main class="members-main">
      <div class="container">

      <div class="members-header">
        <h1>Community Wall</h1>
        <p>Share updates with your Walden's Revisited neighbors.</p>
      </div>

      <!-- Admin: Pending Approvals Banner -->
      <div id="pendingBanner" style="display:none;" class="profile-section" onclick="window.location.href='/members/admin.html?tab=posts';" style="cursor:pointer;">
        <div style="display:flex;align-items:center;gap:var(--space-sm);cursor:pointer;">
          <div style="background:#dc2626;color:white;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.9rem;flex-shrink:0;" id="pendingCount">0</div>
          <div>
            <strong style="color:var(--forest-deep);">Pending Approvals</strong>
            <p style="font-size:0.85rem;color:var(--stone);margin:0;" id="pendingDesc">Items need your attention</p>
          </div>
          <span style="margin-left:auto;color:var(--pond-surface);font-size:0.85rem;">Review &rarr;</span>
        </div>
      </div>

      <!-- Post Composer -->
      <div id="newPostSection" style="background:var(--parchment);border:1px solid rgba(139,115,85,0.15);border-radius:12px;padding:var(--space-md);margin-bottom:var(--space-md);box-shadow:0 2px 8px rgba(45,74,62,0.06);">
        <div style="display:flex;gap:12px;margin-bottom:12px;">
          <div class="composer-avatar" id="postAvatar" style="width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--pond-surface);background:var(--parchment);">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="padding:6px;color:var(--lichen);width:100%;height:100%;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <textarea id="postContent" placeholder="What's on your mind?" rows="3" style="flex:1;border:1px solid rgba(139,115,85,0.15);border-radius:8px;padding:10px 12px;font-family:var(--font-body);font-size:16px;resize:none;outline:none;background:white;transition:border-color 0.2s;min-height:60px;" onfocus="this.style.borderColor='var(--forest-deep)'" onblur="this.style.borderColor='rgba(139,115,85,0.15)'"></textarea>
        </div>
        <div class="composer-preview" id="imagePreview" style="margin-bottom:8px;"></div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding-top:10px;border-top:1px solid rgba(139,115,85,0.08);">
          <label for="postImage" style="cursor:pointer;color:var(--forest-deep);padding:6px;border-radius:6px;display:flex;transition:background 0.15s;" title="Add photo" onmouseover="this.style.background='var(--mist)'" onmouseout="this.style.background=''">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </label>
          <input type="file" id="postImage" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;">
          <select id="postVisibility" style="padding:5px 8px;border:1px solid rgba(139,115,85,0.15);border-radius:6px;font-size:13px;font-family:var(--font-body);background:white;color:var(--charcoal);">
            <option value="friends" selected>Friends</option>
            <option value="everybody">All (approval required)</option>
          </select>
          <button id="allowCommentsBtn" onclick="this.dataset.on = this.dataset.on === '1' ? '0' : '1'; this.textContent = this.dataset.on === '1' ? 'Comments ON' : 'Comments OFF'; this.style.color = this.dataset.on === '1' ? 'var(--forest-deep)' : 'var(--lichen)';" data-on="1" style="background:none;border:1px solid rgba(139,115,85,0.12);border-radius:6px;padding:4px 10px;font-size:12px;font-family:var(--font-body);cursor:pointer;color:var(--forest-deep);font-weight:500;transition:color 0.15s;">Comments ON</button>
          <button class="btn-post" id="postBtn" style="margin-left:auto;padding:7px 20px;font-size:0.85rem;">Post</button>
        </div>
      </div>

      <!-- Posts Feed -->
      <div id="postsFeed"></div>
      <div id="loadMore" style="text-align:center; margin-top:var(--space-md); display:none;">
        <button class="btn btn-secondary" id="loadMoreBtn">Load More</button>
      </div>

      <!-- Feed End -->
      <div style="text-align:center;padding:var(--space-lg) 0;color:var(--lichen);font-size:0.85rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;margin-bottom:4px;opacity:0.5;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <p>You're all caught up.</p>
      </div>
    </div>
  </main>
  </div>

  <script src="/members/avatars.js"></script>
  <script src="/members/members.js"></script>
  <script>
    const session = window.__session;
    if (!session) window.location.href = '/login.html';

    initMembersSidebar('wall');

    // Show admin card for officers and admins
    const elevatedRoles = ['admin', 'president', 'secretary', 'treasurer', 'other_officer'];
    if (elevatedRoles.includes(session.role)) {
      const adminCard = document.getElementById('adminCard');
      if (adminCard) adminCard.style.display = '';
    }

    // Admin: show pending approvals banner
    if (elevatedRoles.includes(session.role)) {
      fetch('/api/admin/pending-count').then(r => r.json()).then(data => {
        if (data.total > 0) {
          const banner = document.getElementById('pendingBanner');
          banner.style.display = '';
          document.getElementById('pendingCount').textContent = data.total;
          const parts = [];
          if (data.users > 0) parts.push(`${data.users} user${data.users > 1 ? 's' : ''} awaiting access`);
          if (data.posts > 0) parts.push(`${data.posts} post${data.posts > 1 ? 's' : ''} pending review`);
          document.getElementById('pendingDesc').textContent = parts.join(', ');
        }
      }).catch(() => {});
    }

    // Set post composer avatar — use cache first, then API
    const avatarEl = document.getElementById('postAvatar');
    function setPostAvatar(pp, avId, gp) {
      if (pp) avatarEl.innerHTML = `<img src="${escapeHtml(pp)}" alt="">`;
      else if (avId && typeof getAvatarSvg === 'function') avatarEl.innerHTML = getAvatarSvg(avId);
      else if (gp) avatarEl.innerHTML = `<img src="${escapeHtml(gp)}" alt="">`;
    }
    try {
      const cached = JSON.parse(sessionStorage.getItem('wr_user_avatar') || 'null');
      if (cached) setPostAvatar(cached.pp, cached.av, cached.gp);
      else setPostAvatar(session.profilePicture, session.avatarId, session.picture);
    } catch(e) { setPostAvatar(session.profilePicture, session.avatarId, session.picture); }
    // Refine from API
    fetch('/api/me').then(r => r.json()).then(me => {
      setPostAvatar(me.profile_picture, me.avatar_id, me.google_picture);
    }).catch(() => {});

    document.getElementById('navToggle')?.addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('active');
    });

    // Image attachment with preview
    let postImageData = null;
    document.getElementById('postImage').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      const preview = document.getElementById('imagePreview');
      if (!file) { postImageData = null; preview.innerHTML = ''; return; }
      if (file.size > 2 * 1024 * 1024) { showToast('Image too large (max 2MB)', 'error'); return; }
      postImageData = await fileToBase64(file);
      preview.innerHTML = `<div class="preview-thumb"><img src="${postImageData}" alt=""><button class="preview-thumb-remove" onclick="clearImagePreview()" type="button">&times;</button></div>`;
    });

    function clearImagePreview() {
      postImageData = null;
      document.getElementById('imagePreview').innerHTML = '';
      document.getElementById('postImage').value = '';
    }

    // Submit post
    document.getElementById('postBtn').addEventListener('click', async () => {
      const content = document.getElementById('postContent').value.trim();
      if (!content) { showToast('Write something first', 'error'); return; }

      const btn = document.getElementById('postBtn');
      btn.disabled = true;
      btn.textContent = 'Posting...';

      try {
        const visibility = document.getElementById('postVisibility').value;
        const allowComments = document.getElementById('allowCommentsBtn').dataset.on === '1';
        const body = { content, visibility, allow_comments: allowComments };
        if (postImageData) body.image = postImageData;

        const res = await fetch('/api/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.success) {
          showToast(data.message, 'success');
          document.getElementById('postContent').value = '';
          clearImagePreview();
          loadPosts(true);
        } else {
          showToast(data.error || 'Error creating post', 'error');
        }
      } catch (e) {
        showToast('Network error', 'error');
      }
      btn.disabled = false;
      btn.textContent = 'Post';
    });

    // Load posts
    let currentPage = 1;
    async function loadPosts(reset) {
      if (reset) { currentPage = 1; }
      try {
        const res = await fetch(`/api/posts?page=${currentPage}`);
        const posts = await res.json();
        const feed = document.getElementById('postsFeed');

        if (reset) feed.innerHTML = '';

        if (posts.length === 0 && currentPage === 1) {
          feed.innerHTML = '<div class="profile-section" style="text-align:center;color:var(--stone);">No posts yet. Be the first to share something with the community!</div>';
        }

        posts.forEach(post => {
          feed.appendChild(createPostEl(post));
        });

        document.getElementById('loadMore').style.display = posts.length >= 20 ? '' : 'none';
      } catch (e) {
        showToast('Failed to load posts', 'error');
      }
    }

    function createPostEl(post) {
      const div = document.createElement('div');
      div.className = 'post-card';

      let authorAvatarHtml;
      if (post.author_profile_picture) {
        authorAvatarHtml = `<img src="${escapeHtml(post.author_profile_picture)}" alt="">`;
      } else if (post.author_avatar_id && typeof getAvatarSvg === 'function') {
        authorAvatarHtml = getAvatarSvg(post.author_avatar_id);
      } else if (post.author_google_picture) {
        authorAvatarHtml = `<img src="${escapeHtml(post.author_google_picture)}" alt="">`;
      } else {
        authorAvatarHtml = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="padding:8px;color:var(--lichen);"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
      }
      const authorName = post.author_anonymous ? 'Anonymous Member' : escapeHtml(post.author_name);
      const roleLabel = formatRole(post.author_role);
      const timeAgo = formatTimeAgo(post.created_at);
      const isPending = !post.approved;
      const isOwn = post.user_id == session.userId;
      const isOfficerPost = (post.visibility === 'officers');
      const isAdminUser = session.role === 'admin';
      const canDelete = isOwn || isAdminUser || (isOfficerPost && elevatedRoles.includes(session.role));
      const wasEdited = post.updated_at && post.updated_at !== post.created_at;
      const vis = post.visibility || 'everybody';

      const visIcons = {
        everybody: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
        friends: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>',
        officers: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
      };

      let imageHtml = post.image ? `<img src="${escapeHtml(post.image)}" alt="" class="post-image">` : '';

      div.innerHTML = `
        <div class="post-header">
          <div class="post-avatar">
            ${authorAvatarHtml}
          </div>
          <div class="post-meta" style="flex:1;">
            <span class="post-meta-name">${authorName} <span class="role-badge ${getRoleBadgeClass(post.author_role)}" style="font-size:0.65rem;vertical-align:middle;">${roleLabel}</span></span>
            <div class="post-meta-info">
              ${timeAgo}${wasEdited ? ' &middot; <span style="font-style:italic;">edited</span>' : ''}${isPending ? ' &middot; <span style="color:#92400e;">Awaiting approval</span>' : ''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
            <span class="vis-indicator">${visIcons[vis] || visIcons.everybody} ${vis === 'everybody' ? 'All' : vis === 'friends' ? 'Friends' : 'Officers'}</span>
            ${isOwn ? `<button class="engage-btn" onclick="editPost(${post.id})" title="Edit" style="color:var(--lichen);">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>` : ''}
            ${canDelete ? `<button class="engage-btn" onclick="deletePost(${post.id})" title="Delete" style="color:var(--lichen);">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>` : ''}
          </div>
        </div>
        <div class="post-content">${renderWithMentions(post.content)}</div>
        ${imageHtml}
        <div class="post-engagement">
          ${isPending ? '<span style="font-size:0.8rem;color:var(--lichen);">Awaiting approval</span>'
            : post.allow_comments !== 0 ? `<button class="engage-btn" onclick="toggleComments(${post.id}, this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            ${post.comment_count > 0 ? `${post.comment_count}` : ''} Comment${post.comment_count !== 1 ? 's' : ''}
          </button>` : '<span style="font-size:0.8rem;color:var(--lichen);">Comments off</span>'}
          ${!isOwn ? `<button class="engage-btn" onclick="reportContent('post', ${post.id})" title="Report" style="margin-left:auto;color:var(--lichen);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></button>` : ''}
        </div>
        <div class="comments-section" id="comments-${post.id}"></div>
      `;
      return div;
    }

    async function editPost(id) {
      const postCard = [...document.querySelectorAll('.post-card')].find(el => el.innerHTML.includes(`editPost(${id})`));
      const contentEl = postCard?.querySelector('.post-content');
      if (!contentEl) return;

      const originalText = contentEl.innerText;
      // Switch to inline editing mode
      contentEl.setAttribute('contenteditable', 'true');
      contentEl.style.border = '1px solid var(--pond-surface)';
      contentEl.style.borderRadius = '8px';
      contentEl.style.padding = '8px 12px';
      contentEl.style.background = 'white';
      contentEl.style.outline = 'none';
      contentEl.style.minHeight = '60px';
      contentEl.focus();

      // Add toolbar and save/cancel buttons
      const toolbar = document.createElement('div');
      toolbar.className = 'edit-toolbar';
      toolbar.innerHTML = `
        <div style="display:flex;gap:4px;margin-bottom:6px;">
          <button class="edit-fmt-btn" onclick="document.execCommand('bold')" title="Bold"><strong>B</strong></button>
          <button class="edit-fmt-btn" onclick="document.execCommand('italic')" title="Italic"><em>I</em></button>
          <button class="edit-fmt-btn" onclick="document.execCommand('underline')" title="Underline"><u>U</u></button>
          <button class="edit-fmt-btn" onclick="document.execCommand('insertUnorderedList')" title="List">&#8226;</button>
        </div>
        <div style="display:flex;gap:6px;justify-content:flex-end;">
          <button class="btn btn-secondary btn-sm" onclick="cancelEditPost(this, '${id}')">Cancel</button>
          <button class="btn btn-primary btn-sm" onclick="saveEditPost(${id})">Save</button>
        </div>
      `;
      contentEl.parentNode.insertBefore(toolbar, contentEl);
      contentEl._originalText = originalText;
      return;
    }

    function cancelEditPost(btn, id) {
      const toolbar = btn.closest('.edit-toolbar');
      const contentEl = toolbar.nextElementSibling;
      contentEl.removeAttribute('contenteditable');
      contentEl.style.cssText = '';
      contentEl.innerText = contentEl._originalText;
      toolbar.remove();
    }

    async function saveEditPost(id) {
      const postCard = [...document.querySelectorAll('.post-card')].find(el => el.innerHTML.includes(`saveEditPost(${id})`));
      const toolbar = postCard?.querySelector('.edit-toolbar');
      const contentEl = toolbar?.nextElementSibling;
      if (!contentEl) return;

      const newText = contentEl.innerText.trim();
      if (!newText) { showToast('Post cannot be empty', 'error'); return; }
      if (newText === contentEl._originalText) { cancelEditPost(toolbar.querySelector('.btn-secondary'), id); return; }

      try {
        const res = await fetch(`/api/posts/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: newText }),
        });
        const data = await res.json();
        if (data.success) {
          showToast('Post updated', 'success');
          loadPosts(true);
        } else { showToast(data.error, 'error'); }
      } catch (e) { showToast('Error editing post', 'error'); }
    }

    async function reportContent(type, id) {
      const reason = prompt('Why are you reporting this? (optional)');
      if (reason === null) return;
      try {
        const res = await fetch('/api/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content_type: type, content_id: id, reason: reason || null }),
        });
        const data = await res.json();
        if (data.success) showToast('Reported. An admin will review.', 'success');
        else showToast(data.error || 'Error', 'error');
      } catch (e) { showToast('Error reporting', 'error'); }
    }

    async function deletePost(id) {
      if (!confirm('Delete this post?')) return;
      try {
        const res = await fetch(`/api/posts/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
          showToast('Post deleted', 'success');
          loadPosts(true);
        }
      } catch (e) {
        showToast('Error deleting post', 'error');
      }
    }

    // Comments
    async function toggleComments(postId, el) {
      const section = document.getElementById(`comments-${postId}`);
      if (!section.classList.contains('open')) {
        section.classList.add('open');
        await loadComments(postId);
      } else {
        section.classList.remove('open');
      }
    }

    async function loadComments(postId) {
      const section = document.getElementById(`comments-${postId}`);
      try {
        const res = await fetch(`/api/posts/${postId}/comments`);
        const comments = await res.json();

        let html = '';
        comments.forEach(c => {
          const cName = c.author_anonymous ? 'Anonymous' : escapeHtml(c.author_name);
          const canEdit = c.user_id === session.userId;
          const canDelete = c.user_id === session.userId || session.role === 'admin';
          let cAvatarHtml;
          if (c.author_profile_picture) {
            cAvatarHtml = `<img src="${escapeHtml(c.author_profile_picture)}" alt="">`;
          } else if (c.author_avatar_id && typeof getAvatarSvg === 'function') {
            cAvatarHtml = getAvatarSvg(c.author_avatar_id);
          } else if (c.author_google_picture) {
            cAvatarHtml = `<img src="${escapeHtml(c.author_google_picture)}" alt="">`;
          } else {
            cAvatarHtml = '<span class="placeholder" style="font-size:0.8rem;">?</span>';
          }
          html += `
            <div class="comment">
              <div class="avatar-preview" style="width:28px;height:28px;">
                ${cAvatarHtml}
              </div>
              <div class="comment-body">
                <strong>${cName}</strong>
                <span class="comment-time">${formatTimeAgo(c.created_at)}</span>
                ${canEdit ? `<span class="comment-delete" onclick="editComment(${c.id}, ${postId})">edit</span>` : ''}
                ${canDelete ? `<span class="comment-delete" onclick="deleteComment(${c.id}, ${postId})">delete</span>` : ''}
                <div style="white-space:pre-wrap;">${renderWithMentions(c.content)}</div>
              </div>
            </div>
          `;
        });

        html += `
          <div class="comment-input">
            <input type="text" id="comment-input-${postId}" placeholder="Write a comment... Use @ to mention" maxlength="1000"
              onkeydown="if(event.key==='Enter')postComment(${postId})">
            <button class="btn btn-primary btn-sm" onclick="postComment(${postId})">Reply</button>
          </div>
        `;
        section.innerHTML = html;

        // Setup @mention on comment input
        setupMentionAutocomplete(`comment-input-${postId}`);
      } catch (e) {
        section.innerHTML = '<p style="color:var(--stone);font-size:0.85rem;">Failed to load comments.</p>';
      }
    }

    async function postComment(postId) {
      const input = document.getElementById(`comment-input-${postId}`);
      const content = input.value.trim();
      if (!content) return;

      try {
        const res = await fetch(`/api/posts/${postId}/comments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content }),
        });
        const data = await res.json();
        if (data.success) {
          loadComments(postId);
        } else {
          showToast(data.error, 'error');
        }
      } catch (e) {
        showToast('Error posting comment', 'error');
      }
    }

    async function editComment(commentId, postId) {
      const commentEl = [...document.querySelectorAll('.comment')].find(el => el.innerHTML.includes(`editComment(${commentId}`));
      const contentDiv = commentEl?.querySelector('.comment-body div');
      const currentText = contentDiv?.innerText || '';
      const newText = prompt('Edit comment:', currentText);
      if (newText === null || newText.trim() === currentText) return;
      if (!newText.trim()) { showToast('Comment cannot be empty', 'error'); return; }
      try {
        const res = await fetch(`/api/comments/${commentId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: newText.trim() }),
        });
        if ((await res.json()).success) { loadComments(postId); }
        else { showToast('Error', 'error'); }
      } catch (e) { showToast('Error editing comment', 'error'); }
    }

    async function deleteComment(commentId, postId) {
      try {
        await fetch(`/api/comments/${commentId}`, { method: 'DELETE' });
        loadComments(postId);
      } catch (e) {
        showToast('Error deleting comment', 'error');
      }
    }

    document.getElementById('loadMoreBtn').addEventListener('click', () => {
      currentPage++;
      loadPosts(false);
    });

    // Setup @mention on post textarea
    setupMentionAutocomplete('postContent');

    loadPosts(true);
  </script>
</body>
</html>
